name: CI/CD Production Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

  build-image:
    name: Build & Push Container Image
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up QEMU (Multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx (Caching)
        uses: docker/setup-buildx-action@v3

      # NOTE: Uncomment credentials to deploy ECR/DockerHub builds
      /*
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      */

      - name: Build Container Bundle
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true once registry credentials are configured
          tags: |
            saifuldevops/portfolio:latest
            saifuldevops/portfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
